version: '3.8'

# Production compose — used on the EC2 server.
# Requires a .env file with EC2_IP set (see README).

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # SQLite file lives inside a named volume so it survives restarts
      DATABASE_URL: sqlite:////data/analytics.db
      FRONTEND_ORIGINS: "http://${EC2_IP}:3000"
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        # Bakes the EC2 IP into the Next.js bundle at build time
        NEXT_PUBLIC_API_URL: "http://${EC2_IP}:8000"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:      # persists SQLite database
  uploads_data: # persists uploaded CSV files
