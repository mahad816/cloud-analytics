version: '3.8'

# Production compose — EC2 / VPS. Frontend uses /api → Next rewrites to backend (no public IP in the bundle).

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/analytics.db
      FRONTEND_ORIGINS: "*"
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        INTERNAL_API_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:      # persists SQLite database
  uploads_data: # persists uploaded CSV files
